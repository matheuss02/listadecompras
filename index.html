<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="src/img/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="src/css/index.css">
    <title>Lista 2026 · Minha Lista</title>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-top">
                <h1 class="titulo">🛒 Lista Compartilhada</h1>
                <button id="logout-btn" class="btn-sair">
                    <span>🚪</span> Sair
                </button>
            </div>
            
            <!-- Barra de pesquisa -->
            <div class="search-container">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Pesquisar itens..." autocomplete="off">
                    <button id="clear-search" class="btn-clear-search" style="display: none;">✕</button>
                </div>
            </div>
        </header>

        <!-- Estatísticas -->
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-number" id="total-itens">0</span>
                <span class="stat-label">Itens</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="pendentes-count">0</span>
                <span class="stat-label">Pendentes</span>
            </div>
            <div class="stat-card destaque">
                <span class="stat-number" id="total-preco">R$ 0,00</span>
                <span class="stat-label">Total</span>
            </div>
        </div>

        <!-- Lista de compras -->
        <div class="lista-container">
            <ul id="lista" class="lista-compras"></ul>
            
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">📝</div>
                <p class="empty-title">Sua lista está vazia</p>
                <p class="empty-hint">Adicione itens com nome e preço!</p>
            </div>
            
            <div id="no-results" class="empty-state" style="display: none;">
                <div class="empty-icon">🔍</div>
                <p class="empty-title">Nenhum item encontrado</p>
                <p class="empty-hint">Tente outro termo de busca</p>
            </div>
        </div>

        <!-- Sugestões automáticas -->
        <div id="sugestoes-container" class="sugestoes-container" style="display: none;">
            <p class="sugestoes-title">💡 Sugestões do histórico:</p>
            <div id="sugestoes-list" class="sugestoes-list"></div>
        </div>

        <!-- Adicionar item -->
        <div class="add-item-form">
            <div class="input-principal">
                <input type="text" id="item" placeholder="Nome do item" autocomplete="off">
                <div class="preco-quantidade">
                    <input type="number" id="quantidade" placeholder="Qtd" min="1" value="1" step="1">
                    <input type="number" id="preco" placeholder="R$ 0,00" min="0" step="0.01">
                </div>
            </div>
            <button id="adicionar-btn" class="btn-adicionar">
                <span>➕ Adicionar</span>
            </button>
        </div>
    </div>

    <script type="module" src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Falha no ServiceWorker:', error);
                    });
            });
        }
    </script>
</body>
</html>
